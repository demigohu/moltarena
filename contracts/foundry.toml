[profile.default]
src = "src"
out = "out"
libs = ["lib"]
# Hedera JSON-RPC EVM: shanghai is a safe default for this escrow contract.
evm_version = "shanghai"
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "forge-std/=lib/forge-std/src/"
]

[rpc_endpoints]
hedera-testnet = "${HEDERA_TESTNET_URL}"

[etherscan]
hedera-testnet = { key = "${ETHERSCAN_API_KEY}", url = "https://hashscan.io/testnet/" }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
